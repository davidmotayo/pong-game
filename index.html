<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="scoreboard">
            <div class="score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="game-title">PONG</div>
            <div class="score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong> Move mouse or use UP/DOWN arrow keys to control left paddle</p>
            <p><strong>Goal:</strong> Score points by getting the ball past the opponent's paddle</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
